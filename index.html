<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Євгеній Каспаров — IT Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0f14;
            --surface-color: #1a1d24;
            --primary-color: #6aa6ff;
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
            --border-color: #2a2d35;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hub-container {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 50px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(106, 166, 255, 0.2);
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .tg-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            padding: 8px 16px;
            background: rgba(106, 166, 255, 0.1);
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            border: 1px solid rgba(106, 166, 255, 0.2);
            transition: all 0.3s ease;
        }

        .tg-link:hover {
            background: rgba(106, 166, 255, 0.2);
            transform: scale(1.05);
        }

        .tg-link i {
            font-size: 16px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            border-color: var(--primary-color);
            background: rgba(106, 166, 255, 0.05);
            transform: translateY(-2px);
        }

        .menu-btn i {
            font-size: 18px;
            color: var(--primary-color);
        }

        .status-badge {
            margin-top: 30px;
            display: inline-block;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .hub-container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <!-- Твоє фото -->
        <img src="images.png" alt="Євгеній Каспаров" class="avatar">
        
        <h1>Євгеній Каспаров</h1>
        <h2>IT Support / Hardware Engineer</h2>

        <!-- Telegram посилання -->
        <a href="https://t.me/Evgenii_414" target="_blank" class="tg-link">
            <i class="fa-brands fa-telegram"></i> @Evgenii_414
        </a>

        <!-- Навігаційне меню -->
        <div class="menu-grid">
            <a href="summary.html" class="menu-btn">
                <i class="fa-solid fa-bolt"></i>
                Коротко про мене (Умови & Навички)
            </a>
            
            <a href="resume.html" class="menu-btn">
                <i class="fa-solid fa-file-pdf"></i>
                Переглянути CV (Резюме)
            </a>

            <a href="bio.html" class="menu-btn">
                <i class="fa-solid fa-terminal"></i>
                Автобіографія (Мій шлях)
            </a>
        </div>

        <div class="status-badge">
            <i class="fa-solid fa-circle-check"></i> Не соромтеся писати, я відкритий до пропозицій
        </div>
    </div>

</body>
</html>
